<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>習慣トラッカー</title>
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="icon" href="./apple-touch-icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --color-bg:#f7f6f2; --color-surface:#f9f8f5; --color-surface-2:#fbfbf9; --color-surface-offset:#f3f0ec;
      --color-border:#d4d1ca; --color-divider:#dcd9d5; --color-text:#28251d; --color-text-muted:#6f6b64;
      --color-text-faint:#9a968f; --color-text-inverse:#f9f8f4; --color-primary:#01696f; --color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8; --color-success:#437a22; --color-gold:#d19900; --color-orange:#da7101;
      --color-error:#a12c7b; --radius-sm:.375rem; --radius-md:.5rem; --radius-lg:.875rem; --radius-xl:1rem; --radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(0,0,0,.06); --shadow-md:0 4px 12px rgba(0,0,0,.08); --shadow-lg:0 12px 32px rgba(0,0,0,.12);
      --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem; --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem); --text-sm:clamp(.875rem,.8rem + .35vw,1rem); --text-base:clamp(1rem,.95rem + .25vw,1.0625rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.35rem); --text-xl:clamp(1.4rem,1.2rem + 1vw,2rem);
      --font-body:'Noto Sans JP', sans-serif; --transition:180ms cubic-bezier(0.16,1,0.3,1);
    }
    [data-theme="dark"] {
      --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d; --color-surface-offset:#1d1c1a;
      --color-border:#393836; --color-divider:#262523; --color-text:#e2dfd9; --color-text-muted:#aaa6a0;
      --color-text-faint:#6a6761; --color-text-inverse:#181614; --color-primary:#4f98a3; --color-primary-hover:#227f8b;
      --color-primary-highlight:#313b3b; --color-success:#74b04a; --color-gold:#e8af34; --color-orange:#fdab43; --color-error:#d163a7;
      --shadow-sm:0 1px 2px rgba(0,0,0,.24); --shadow-md:0 4px 12px rgba(0,0,0,.34); --shadow-lg:0 12px 32px rgba(0,0,0,.42);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%}
    body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);line-height:1.55}
    button,input,select{font:inherit;color:inherit}
    button{border:0;background:none;cursor:pointer}
    .app{max-width:430px;margin:0 auto;min-height:100dvh;padding:env(safe-area-inset-top) var(--space-4) calc(env(safe-area-inset-bottom) + 96px)}
    .topbar{position:sticky;top:0;background:color-mix(in srgb, var(--color-bg) 92%, transparent);backdrop-filter:blur(10px);padding:var(--space-4) 0 var(--space-3);display:flex;justify-content:space-between;align-items:flex-start;z-index:20}
    .brand{display:flex;gap:var(--space-3);align-items:center}
    .logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--color-primary-highlight),var(--color-surface-2));display:grid;place-items:center;box-shadow:var(--shadow-sm)}
    .logo svg{width:24px;height:24px}
    .title{font-size:var(--text-xl);font-weight:800;letter-spacing:-.02em}
    .subtitle{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px}
    .theme-toggle{width:44px;height:44px;border-radius:14px;background:var(--color-surface);border:1px solid var(--color-border);display:grid;place-items:center;box-shadow:var(--shadow-sm)}
    .hero{margin-top:var(--space-4);padding:var(--space-5);background:linear-gradient(145deg,var(--color-surface),var(--color-surface-2));border:1px solid var(--color-border);border-radius:24px;box-shadow:var(--shadow-md)}
    .hero-row{display:flex;justify-content:space-between;gap:var(--space-3);align-items:center}
    .hero h2{font-size:var(--text-lg);font-weight:800}
    .hero p{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:4px}
    .progress-wrap{margin-top:var(--space-4)}
    .progress-meta{display:flex;justify-content:space-between;font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:8px}
    .progress-track{width:100%;height:12px;background:var(--color-surface-offset);border-radius:999px;overflow:hidden}
    .progress-bar{height:100%;background:linear-gradient(90deg,var(--color-primary),var(--color-success));width:0%;transition:width .25s ease}
    .section{margin-top:var(--space-6)}
    .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-3)}
    .section-title{font-size:var(--text-lg);font-weight:800}
    .section-note{font-size:var(--text-xs);color:var(--color-text-muted)}
    .habit-list{display:grid;gap:var(--space-3)}
    .habit-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:22px;padding:var(--space-4);box-shadow:var(--shadow-sm)}
    .habit-top{display:flex;justify-content:space-between;gap:var(--space-3);align-items:flex-start}
    .habit-main{display:flex;gap:var(--space-3);min-width:0;flex:1}
    .habit-emoji{width:48px;height:48px;border-radius:16px;background:var(--color-surface-offset);display:grid;place-items:center;font-size:1.5rem;flex:0 0 auto}
    .habit-name{font-size:var(--text-base);font-weight:800}
    .habit-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:var(--text-xs);font-weight:700;background:var(--color-surface-offset);color:var(--color-text-muted)}
    .badge.success{background:color-mix(in srgb, var(--color-success) 14%, var(--color-surface));color:var(--color-success)}
    .badge.primary{background:var(--color-primary-highlight);color:var(--color-primary)}
    .stars{font-size:1rem;letter-spacing:.08em;color:var(--color-gold);font-weight:800}
    .habit-actions{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
    .check-btn,.delete-btn,.secondary-btn,.ghost-btn,.icon-btn,.save-btn,.tab-btn,.small-btn{transition:all var(--transition)}
    .check-btn{min-width:92px;height:40px;padding:0 14px;border-radius:999px;background:var(--color-primary);color:var(--color-text-inverse);font-weight:800;box-shadow:var(--shadow-sm)}
    .check-btn.done{background:var(--color-success)}
    .delete-btn{width:40px;height:40px;border-radius:12px;background:var(--color-surface-offset);border:1px solid var(--color-border);display:grid;place-items:center}
    .delete-btn:hover,.icon-btn:hover,.ghost-btn:hover,.secondary-btn:hover{background:var(--color-surface-offset)}
    .empty{padding:var(--space-8) var(--space-4);text-align:center;background:var(--color-surface);border:1px dashed var(--color-border);border-radius:24px;color:var(--color-text-muted)}
    .calendar-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:24px;padding:var(--space-4);box-shadow:var(--shadow-sm)}
    .calendar-head{display:flex;justify-content:space-between;align-items:center;gap:var(--space-2);margin-bottom:var(--space-4)}
    .calendar-title{font-size:var(--text-base);font-weight:800}
    .month-nav{display:flex;gap:8px}
    .icon-btn,.small-btn,.ghost-btn,.secondary-btn,.save-btn,.tab-btn{border:1px solid var(--color-border)}
    .icon-btn,.small-btn{width:40px;height:40px;border-radius:12px;background:var(--color-surface-2);display:grid;place-items:center}
    .tab-row{display:flex;gap:8px;margin-bottom:var(--space-4)}
    .tab-btn{flex:1;padding:10px 12px;border-radius:14px;background:var(--color-surface-2);font-weight:700}
    .tab-btn.active{background:var(--color-primary-highlight);color:var(--color-primary);border-color:transparent}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
    .weekday{font-size:var(--text-xs);color:var(--color-text-muted);text-align:center;padding-bottom:6px}
    .day-cell{min-height:74px;border-radius:16px;border:1px solid var(--color-border);background:var(--color-surface-2);padding:8px;display:flex;flex-direction:column;gap:6px}
    .day-cell.muted{opacity:.35}
    .day-num{font-size:var(--text-xs);font-weight:800;color:var(--color-text-muted)}
    .day-stars{font-size:.8rem;line-height:1.2;color:var(--color-gold);white-space:pre-line}
    .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:var(--space-3);font-size:var(--text-xs);color:var(--color-text-muted)}
    .habit-month-list{display:grid;gap:10px}
    .month-habit-row{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px;padding:12px;border-radius:16px;background:var(--color-surface-2);border:1px solid var(--color-border);align-items:center}
    .month-habit-name{font-weight:700}
    .month-habit-score,.month-habit-rate{font-size:var(--text-sm);color:var(--color-text-muted);text-align:right}
    .fab{position:fixed;right:calc(50% - 215px + 16px);bottom:calc(env(safe-area-inset-bottom) + 16px);width:64px;height:64px;border-radius:22px;background:var(--color-primary);color:var(--color-text-inverse);display:grid;place-items:center;box-shadow:var(--shadow-lg);z-index:30}
    @media (max-width:430px){.fab{right:16px}}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;align-items:flex-end;justify-content:center;z-index:40;padding:0}
    .modal.active{display:flex}
    .sheet{width:min(430px,100%);max-height:92dvh;overflow:auto;background:var(--color-bg);border-radius:26px 26px 0 0;padding:var(--space-4);box-shadow:var(--shadow-lg)}
    .sheet-handle{width:48px;height:5px;border-radius:999px;background:var(--color-border);margin:0 auto var(--space-4)}
    .sheet h3{font-size:var(--text-lg);font-weight:800;margin-bottom:4px}
    .sheet p{font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-4)}
    .field{margin-bottom:var(--space-4)}
    .field label{display:block;font-size:var(--text-sm);font-weight:700;margin-bottom:8px}
    .input,.select{width:100%;height:48px;padding:0 14px;border-radius:14px;border:1px solid var(--color-border);background:var(--color-surface);outline:none}
    .input:focus,.select:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--color-primary) 15%, transparent)}
    .grid-emoji,.chip-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .emoji-btn,.chip{min-height:46px;padding:10px;border-radius:14px;background:var(--color-surface);border:1px solid var(--color-border);display:grid;place-items:center;font-size:1.25rem}
    .chip{font-size:var(--text-sm);font-weight:700}
    .emoji-btn.selected,.chip.selected{background:var(--color-primary-highlight);border-color:transparent;color:var(--color-primary)}
    .sheet-actions{display:flex;gap:10px;position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--color-bg) 28%);padding-top:var(--space-4)}
    .ghost-btn,.secondary-btn,.save-btn{height:50px;border-radius:16px;padding:0 16px;background:var(--color-surface);font-weight:800}
    .secondary-btn{flex:1}
    .save-btn{flex:2;background:var(--color-primary);border-color:transparent;color:var(--color-text-inverse)}
    .hint{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:6px}
    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 88px);background:var(--color-text);color:var(--color-text-inverse);padding:12px 16px;border-radius:999px;font-size:var(--text-sm);box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:50}
    .toast.show{opacity:1}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-label="Habit mark A">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
            <path d="M8 8.5H15.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M8 12H13.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M8 15.5H11.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M13.2 15.8 15 17.6 18.4 13.9" stroke="#B7FF3C" stroke-width="2.2"/>
          </svg>
        </div>
        <div>
          <h1 class="title">習慣トラッカー</h1>
          <div class="subtitle" id="today-label"></div>
        </div>
      </div>
      <button class="theme-toggle" data-theme-toggle aria-label="テーマ切替">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <section class="hero">
      <div class="hero-row">
        <div>
          <h2>今日の達成状況</h2>
          <p>習慣ごとの達成を保存し、月間カレンダーで★★★評価を確認できます。</p>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="progress-label">0 / 0 完了 (0%)</span>
          <span id="progress-stars">今日の評価: ー</span>
        </div>
        <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <div class="section-title">習慣一覧</div>
          <div class="section-note">追加・削除・達成記録が保存されます</div>
        </div>
      </div>
      <div class="habit-list" id="habit-list"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <div class="section-title">月間ビュー</div>
          <div class="section-note">日別評価と項目別の月間達成率</div>
        </div>
      </div>
      <div class="calendar-card">
        <div class="tab-row">
          <button class="tab-btn active" id="tab-daily">日別</button>
          <button class="tab-btn" id="tab-habit">項目別</button>
        </div>
        <div id="daily-view">
          <div class="calendar-head">
            <button class="icon-btn" id="prev-month" aria-label="前月">‹</button>
            <div class="calendar-title" id="calendar-title"></div>
            <button class="icon-btn" id="next-month" aria-label="翌月">›</button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
          <div class="legend">
            <span>★ = 1/3未満</span>
            <span>★★ = 1/3以上</span>
            <span>★★★ = ほぼ完了</span>
          </div>
        </div>
        <div id="habit-view" style="display:none">
          <div class="calendar-head">
            <div class="calendar-title" id="habit-summary-title"></div>
          </div>
          <div class="habit-month-list" id="habit-month-list"></div>
        </div>
      </div>
    </section>
  </div>

  <button class="fab" id="open-add-btn" aria-label="習慣を追加">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <div class="modal" id="habit-modal">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 id="modal-title">習慣を追加</h3>
      <p>名前・アイコン・時刻を決めて保存します。</p>
      <div class="field">
        <label for="habit-name-input">習慣名</label>
        <input id="habit-name-input" class="input" type="text" maxlength="24" placeholder="例: 読書 20分">
      </div>
      <div class="field">
        <label>アイコン</label>
        <div class="grid-emoji" id="emoji-grid">
          <button class="emoji-btn selected" data-emoji="📘">📘</button>
          <button class="emoji-btn" data-emoji="💪">💪</button>
          <button class="emoji-btn" data-emoji="🧘">🧘</button>
          <button class="emoji-btn" data-emoji="💧">💧</button>
          <button class="emoji-btn" data-emoji="🏃">🏃</button>
          <button class="emoji-btn" data-emoji="📝">📝</button>
          <button class="emoji-btn" data-emoji="🎯">🎯</button>
          <button class="emoji-btn" data-emoji="😴">😴</button>
          <button class="emoji-btn" data-emoji="🍎">🍎</button>
          <button class="emoji-btn" data-emoji="📿">📿</button>
          <button class="emoji-btn" data-emoji="🚶">🚶</button>
          <button class="emoji-btn" data-emoji="🏋️">🏋️</button>
          <button class="emoji-btn" data-emoji="🧠">🧠</button>
          <button class="emoji-btn" data-emoji="📚">📚</button>
          <button class="emoji-btn" data-emoji="💻">💻</button>
          <button class="emoji-btn" data-emoji="✍️">✍️</button>
          <button class="emoji-btn" data-emoji="🎹">🎹</button>
          <button class="emoji-btn" data-emoji="🎸">🎸</button>
          <button class="emoji-btn" data-emoji="🗣️">🗣️</button>
          <button class="emoji-btn" data-emoji="🧹">🧹</button>
          <button class="emoji-btn" data-emoji="🛏️">🛏️</button>
          <button class="emoji-btn" data-emoji="😴">😴</button>
          <button class="emoji-btn" data-emoji="📰">📰</button>
          <button class="emoji-btn" data-emoji="📔">📔</button>
          <button class="emoji-btn" data-emoji="🦷">🦷</button>
          <button class="emoji-btn" data-emoji="🚭">🚭</button>
          <button class="emoji-btn" data-emoji="☕">☕</button>
          <button class="emoji-btn" data-emoji="🥗">🥗</button>
          <button class="emoji-btn" data-emoji="📈">📈</button>
          <button class="emoji-btn" data-emoji="💰">💰</button>
          <button class="emoji-btn" data-emoji="🙏">🙏</button>
          <button class="emoji-btn" data-emoji="🌙">🌙</button>
          <button class="emoji-btn" data-emoji="🧴">🧴</button>
        </div>
      </div>
      <div class="field">
        <label for="habit-time-input">目安の時刻</label>
        <input id="habit-time-input" class="input" type="time" value="07:00">
        <div class="hint">通知ではなく、習慣の記録用の時刻です。</div>
      </div>
      <div class="sheet-actions">
        <button class="secondary-btn" id="cancel-habit-btn">キャンセル</button>
        <button class="save-btn" id="save-habit-btn">保存する</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'habit_tracker_v2';
    const state = {
      habits: [],
      nextId: 1,
      selectedEmoji: '📘',
      editingId: null,
      viewMonth: new Date().getMonth(),
      viewYear: new Date().getFullYear()
    };

    function todayKey(date = new Date()) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatDateJP(date) {
      return new Intl.DateTimeFormat('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' }).format(date);
    }

    function formatMonthTitle(year, month) {
      return `${year}年 ${month + 1}月`;
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.remove('show'), 1800);
    }

    function cloneDefaultHistory() { return {}; }

    function starText(ratio) {
      if (ratio <= 0) return 'ー';
      if (ratio < 1/3) return '★';
      if (ratio < 2/3) return '★★';
      return '★★★';
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        state.habits = Array.isArray(saved.habits) ? saved.habits.map(h => ({
          id: h.id,
          name: h.name || '',
          emoji: h.emoji || '📘',
          time: h.time || '07:00',
          history: h.history && typeof h.history === 'object' ? h.history : cloneDefaultHistory()
        })) : [];
        state.nextId = Number(saved.nextId) || (state.habits.reduce((m,h)=>Math.max(m,h.id),0)+1) || 1;
      } catch (e) {}
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ habits: state.habits, nextId: state.nextId }));
    }

    function seedIfEmpty() {
      if (state.habits.length) return;
      state.habits = [
        { id: 1, name: '読書 20分', emoji: '📘', time: '07:00', history: {} },
        { id: 2, name: 'ストレッチ', emoji: '🧘', time: '21:00', history: {} },
        { id: 3, name: '水を飲む', emoji: '💧', time: '09:00', history: {} }
      ];
      state.nextId = 4;
      saveState();
    }

    function getHabitById(id) { return state.habits.find(h => h.id === id); }

    function isDoneToday(habit, dateKey = todayKey()) {
      return Boolean(habit.history?.[dateKey]);
    }

    function toggleHabit(id, dateKey = todayKey()) {
      const habit = getHabitById(id);
      if (!habit) return;
      habit.history ||= {};
      if (habit.history[dateKey]) {
        delete habit.history[dateKey];
        showToast(`「${habit.name}」を未達成に戻しました`);
      } else {
        habit.history[dateKey] = 1;
        showToast(`「${habit.name}」を達成として保存しました`);
      }
      saveState();
      renderAll();
    }

    function deleteHabit(id) {
      const habit = getHabitById(id);
      if (!habit) return;
      const ok = confirm(`「${habit.name}」を削除しますか？\n過去の達成記録も削除されます。`);
      if (!ok) return;
      state.habits = state.habits.filter(h => h.id !== id);
      saveState();
      renderAll();
      showToast('習慣を削除しました');
    }

    function calcCurrentStreak(habit) {
      let streak = 0;
      const cursor = new Date();
      for (let i = 0; i < 366; i++) {
        const key = todayKey(cursor);
        if (habit.history?.[key]) {
          streak += 1;
          cursor.setDate(cursor.getDate() - 1);
        } else {
          if (i === 0) {
            cursor.setDate(cursor.getDate() - 1);
            if (habit.history?.[todayKey(cursor)]) {
              streak += 1;
              cursor.setDate(cursor.getDate() - 1);
              while (habit.history?.[todayKey(cursor)]) {
                streak += 1;
                cursor.setDate(cursor.getDate() - 1);
              }
            }
          }
          break;
        }
      }
      return streak;
    }

    function totalDoneToday() {
      return state.habits.filter(h => isDoneToday(h)).length;
    }

    function renderProgress() {
      const done = totalDoneToday();
      const total = state.habits.length;
      const pct = total ? Math.round(done / total * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-label').textContent = `${done} / ${total} 完了 (${pct}%)`;
      document.getElementById('progress-stars').textContent = `今日の評価: ${starText(total ? done / total : 0)}`;
    }

    function renderHabits() {
      const list = document.getElementById('habit-list');
      if (!state.habits.length) {
        list.innerHTML = '<div class="empty">まだ習慣がありません。右下の＋から追加してください。</div>';
        return;
      }
      list.innerHTML = state.habits.map(h => {
        const done = isDoneToday(h);
        const streak = calcCurrentStreak(h);
        return `
          <article class="habit-card">
            <div class="habit-top">
              <div class="habit-main">
                <div class="habit-emoji">${h.emoji}</div>
                <div>
                  <div class="habit-name">${h.name}</div>
                  <div class="habit-meta">
                    <span class="badge">🕒 ${h.time}</span>
                    <span class="badge primary">連続 ${streak}日</span>
                    <span class="badge ${done ? 'success' : ''}">${done ? '今日達成' : '未達成'}</span>
                  </div>
                </div>
              </div>
              <div class="habit-actions">
                <button class="check-btn ${done ? 'done' : ''}" onclick="toggleHabit(${h.id})">${done ? '達成済み' : '達成する'}</button>
                <button class="delete-btn" onclick="deleteHabit(${h.id})" aria-label="削除">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                </button>
              </div>
            </div>
          </article>`;
      }).join('');
    }

    function monthMatrix(year, month) {
      const first = new Date(year, month, 1);
      const startWeekday = first.getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < startWeekday; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));
      while (cells.length % 7 !== 0) cells.push(null);
      return cells;
    }

    function renderCalendar() {
      document.getElementById('calendar-title').textContent = formatMonthTitle(state.viewYear, state.viewMonth);
      document.getElementById('habit-summary-title').textContent = `${formatMonthTitle(state.viewYear, state.viewMonth)} の項目別達成度`;
      const grid = document.getElementById('calendar-grid');
      const weekdays = ['日','月','火','水','木','金','土'];
      const cells = monthMatrix(state.viewYear, state.viewMonth);
      let html = weekdays.map(d => `<div class="weekday">${d}</div>`).join('');
      cells.forEach(date => {
        if (!date) {
          html += '<div class="day-cell muted"></div>';
          return;
        }
        const key = todayKey(date);
        const total = state.habits.length;
        const doneCount = state.habits.filter(h => h.history?.[key]).length;
        const dailyStars = starText(total ? doneCount / total : 0);
        const lines = state.habits.slice(0,3).map(h => `${h.emoji}${h.history?.[key] ? '★' : '・'}`).join('\n');
        html += `<div class="day-cell${key===todayKey() ? '' : ''}"><div class="day-num">${date.getDate()}</div><div class="stars">${dailyStars}</div><div class="day-stars">${lines}</div></div>`;
      });
      grid.innerHTML = html;

      const list = document.getElementById('habit-month-list');
      const year = state.viewYear, month = state.viewMonth;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      list.innerHTML = state.habits.length ? state.habits.map(h => {
        let count = 0;
        for (let d = 1; d <= daysInMonth; d++) {
          const key = todayKey(new Date(year, month, d));
          if (h.history?.[key]) count++;
        }
        const ratio = daysInMonth ? count / daysInMonth : 0;
        return `<div class="month-habit-row"><div class="month-habit-name">${h.emoji} ${h.name}</div><div class="month-habit-score">${starText(ratio)}</div><div class="month-habit-rate">${count}/${daysInMonth}日</div></div>`;
      }).join('') : '<div class="empty">習慣が追加されると、ここに月間集計が表示されます。</div>';
    }

    function renderAll() {
      document.getElementById('today-label').textContent = formatDateJP(new Date());
      renderProgress();
      renderHabits();
      renderCalendar();
    }

    function openModal(editingId = null) {
      state.editingId = editingId;
      const modal = document.getElementById('habit-modal');
      const title = document.getElementById('modal-title');
      const nameInput = document.getElementById('habit-name-input');
      const timeInput = document.getElementById('habit-time-input');
      document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('selected'));
      if (editingId) {
        const h = getHabitById(editingId);
        if (!h) return;
        title.textContent = '習慣を編集';
        nameInput.value = h.name;
        timeInput.value = h.time;
        state.selectedEmoji = h.emoji;
      } else {
        title.textContent = '習慣を追加';
        nameInput.value = '';
        timeInput.value = '07:00';
        state.selectedEmoji = '📘';
      }
      const selectedBtn = [...document.querySelectorAll('.emoji-btn')].find(btn => btn.dataset.emoji === state.selectedEmoji);
      if (selectedBtn) selectedBtn.classList.add('selected');
      modal.classList.add('active');
      setTimeout(() => nameInput.focus(), 30);
    }

    function closeModal() {
      document.getElementById('habit-modal').classList.remove('active');
      state.editingId = null;
    }

    document.getElementById('open-add-btn').addEventListener('click', () => openModal());
    document.getElementById('cancel-habit-btn').addEventListener('click', closeModal);
    document.getElementById('habit-modal').addEventListener('click', e => { if (e.target.id === 'habit-modal') closeModal(); });
    document.getElementById('emoji-grid').addEventListener('click', e => {
      const btn = e.target.closest('.emoji-btn');
      if (!btn) return;
      document.querySelectorAll('.emoji-btn').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      state.selectedEmoji = btn.dataset.emoji;
    });

    document.getElementById('save-habit-btn').addEventListener('click', () => {
      const name = document.getElementById('habit-name-input').value.trim();
      const time = document.getElementById('habit-time-input').value || '07:00';
      if (!name) {
        document.getElementById('habit-name-input').focus();
        return;
      }
      if (state.editingId) {
        const h = getHabitById(state.editingId);
        if (!h) return;
        h.name = name; h.time = time; h.emoji = state.selectedEmoji;
        showToast('習慣を更新しました');
      } else {
        state.habits.push({ id: state.nextId++, name, emoji: state.selectedEmoji, time, history: {} });
        showToast('習慣を追加しました');
      }
      saveState();
      closeModal();
      renderAll();
    });

    document.getElementById('tab-daily').addEventListener('click', () => {
      document.getElementById('tab-daily').classList.add('active');
      document.getElementById('tab-habit').classList.remove('active');
      document.getElementById('daily-view').style.display = '';
      document.getElementById('habit-view').style.display = 'none';
    });
    document.getElementById('tab-habit').addEventListener('click', () => {
      document.getElementById('tab-habit').classList.add('active');
      document.getElementById('tab-daily').classList.remove('active');
      document.getElementById('daily-view').style.display = 'none';
      document.getElementById('habit-view').style.display = '';
    });

    document.getElementById('prev-month').addEventListener('click', () => {
      state.viewMonth -= 1;
      if (state.viewMonth < 0) { state.viewMonth = 11; state.viewYear -= 1; }
      renderCalendar();
    });
    document.getElementById('next-month').addEventListener('click', () => {
      state.viewMonth += 1;
      if (state.viewMonth > 11) { state.viewMonth = 0; state.viewYear += 1; }
      renderCalendar();
    });

    (function(){
      const t = document.querySelector('[data-theme-toggle]');
      const r = document.documentElement;
      let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      r.setAttribute('data-theme', d);
      t.addEventListener('click', () => {
        d = d === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', d);
        t.innerHTML = d === 'dark'
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      });
    })();

    loadState();
    seedIfEmpty();
    renderAll();
    window.toggleHabit = toggleHabit;
    window.deleteHabit = deleteHabit;
  </script>
</body>
</html>
