<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>習慣トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN TOKENS ===== */
:root, [data-theme="light"] {
  --color-bg: #f7f6f2;
  --color-surface: #f9f8f5;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f0ede8;
  --color-divider: #dcd9d5;
  --color-border: #d4d1ca;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-text-faint: #bab9b4;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-highlight: #cedcd8;
  --color-success: #437a22;
  --color-success-hover: #2e5c10;
  --color-success-highlight: #d4dfcc;
  --color-error: #a12c7b;
  --color-error-highlight: #e0ced7;
  --color-warning: #964219;
  --color-warning-highlight: #ddcfc6;
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
  --space-12: 3rem; --space-16: 4rem;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --font-body: 'Noto Sans JP', sans-serif;
}
[data-theme="dark"] {
  --color-bg: #171614;
  --color-surface: #1c1b19;
  --color-surface-2: #201f1d;
  --color-surface-offset: #22211f;
  --color-divider: #262523;
  --color-border: #393836;
  --color-text: #cdccca;
  --color-text-muted: #797876;
  --color-text-faint: #5a5957;
  --color-primary: #4f98a3;
  --color-primary-hover: #227f8b;
  --color-primary-highlight: #313b3b;
  --color-success: #6daa45;
  --color-success-hover: #4d8f25;
  --color-success-highlight: #3a4435;
  --color-error: #d163a7;
  --color-error-highlight: #4c3d46;
  --color-warning: #bb653b;
  --color-warning-highlight: #564942;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
    --color-surface-offset: #22211f; --color-divider: #262523; --color-border: #393836;
    --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
    --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b;
    --color-success: #6daa45; --color-success-highlight: #3a4435;
    --color-error: #d163a7; --color-error-highlight: #4c3d46;
    --color-warning: #bb653b; --color-warning-highlight: #564942;
  }
}

/* ===== BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; text-size-adjust: none; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base);
  color: var(--color-text); background: var(--color-bg); padding-bottom: calc(var(--space-16) + env(safe-area-inset-bottom));
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input { font: inherit; color: inherit; }
a, button, [role="button"] { transition: color var(--transition-interactive), background var(--transition-interactive), box-shadow var(--transition-interactive), opacity var(--transition-interactive); }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ===== LAYOUT ===== */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--color-surface); border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.1);
  padding: var(--space-3) var(--space-4);
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow-sm);
}
.app-logo {
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-lg); font-weight: 700; color: var(--color-text);
  text-decoration: none;
}
.app-logo svg { color: var(--color-primary); }
.header-actions { display: flex; align-items: center; gap: var(--space-2); }
.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: var(--radius-full);
  color: var(--color-text-muted);
}
.icon-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
.icon-btn:active { background: var(--color-divider); }

.main { max-width: 480px; margin: 0 auto; padding: var(--space-6) var(--space-4); }

/* ===== DATE STRIP ===== */
.date-header { margin-bottom: var(--space-6); }
.date-label { font-size: var(--text-xs); color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-1); }
.date-today { font-size: var(--text-xl); font-weight: 700; color: var(--color-text); }
.progress-bar-wrap { margin-top: var(--space-3); background: var(--color-surface-offset); border-radius: var(--radius-full); height: 6px; overflow: hidden; }
.progress-bar-fill {
  height: 100%; border-radius: var(--radius-full);
  background: var(--color-primary);
  transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.progress-label { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-2); }

/* ===== SECTION HEADING ===== */
.section-heading {
  font-size: var(--text-sm); font-weight: 600; color: var(--color-text-muted);
  text-transform: uppercase; letter-spacing: 0.06em;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-3);
}
.add-btn {
  display: flex; align-items: center; gap: var(--space-1);
  font-size: var(--text-xs); font-weight: 600; color: var(--color-primary);
  padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
  border: 1px solid var(--color-primary); min-height: 32px;
}
.add-btn:hover { background: var(--color-primary-highlight); }
.add-btn:active { background: var(--color-primary); color: #fff; }

/* ===== HABIT CARD ===== */
.habit-list { display: flex; flex-direction: column; gap: var(--space-3); margin-bottom: var(--space-8); }
.habit-card {
  background: var(--color-surface);
  border: 1px solid oklch(from var(--color-text) l c h / 0.08);
  border-radius: var(--radius-xl);
  padding: var(--space-4);
  display: flex; align-items: center; gap: var(--space-4);
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition-interactive), transform var(--transition-interactive);
  position: relative;
}
.habit-card:active { transform: scale(0.98); }
.habit-card.completed { background: var(--color-success-highlight); border-color: oklch(from var(--color-success) l c h / 0.25); }
.habit-card.overdue:not(.completed) { border-color: oklch(from var(--color-error) l c h / 0.3); }
.check-btn {
  width: 44px; height: 44px; min-width: 44px;
  border-radius: var(--radius-full);
  border: 2px solid var(--color-border);
  display: flex; align-items: center; justify-content: center;
  background: var(--color-surface-2);
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  flex-shrink: 0;
}
.check-btn:hover { border-color: var(--color-success); background: var(--color-success-highlight); }
.check-btn:active { transform: scale(0.92); }
.check-btn.done { background: var(--color-success); border-color: var(--color-success); }
.check-btn.done svg { color: #fff; }
.check-btn svg { color: var(--color-text-faint); transition: color 0.2s; }
.check-btn:hover svg { color: var(--color-success); }

.habit-info { flex: 1; min-width: 0; }
.habit-name { font-size: var(--text-base); font-weight: 600; color: var(--color-text); line-height: 1.3; }
.habit-card.completed .habit-name { text-decoration: line-through; color: var(--color-text-muted); }
.habit-meta { display: flex; align-items: center; gap: var(--space-2); margin-top: var(--space-1); flex-wrap: wrap; }
.habit-time { font-size: var(--text-xs); color: var(--color-text-muted); display: flex; align-items: center; gap: var(--space-1); }
.habit-streak { font-size: var(--text-xs); font-weight: 600; color: var(--color-warning); display: flex; align-items: center; gap: 2px; }
.status-badge {
  font-size: var(--text-xs); font-weight: 600; padding: 2px var(--space-2);
  border-radius: var(--radius-full);
}
.status-badge.done { background: var(--color-success-highlight); color: var(--color-success-hover); }
.status-badge.due { background: var(--color-error-highlight); color: var(--color-error); }
.status-badge.upcoming { background: var(--color-surface-offset); color: var(--color-text-muted); }
.habit-actions { display: flex; flex-direction: column; gap: var(--space-1); align-items: flex-end; flex-shrink: 0; }
.delete-btn { width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; color: var(--color-text-faint); opacity: 0; transition: opacity 0.15s, background 0.15s, color 0.15s; }
.habit-card:hover .delete-btn { opacity: 1; }
.delete-btn:hover { background: var(--color-error-highlight); color: var(--color-error); }

/* ===== POPUP NOTIFICATION ===== */
.popup-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: oklch(from var(--color-bg) l c h / 0.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; padding: var(--space-4);
  opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
}
.popup-overlay.active { opacity: 1; pointer-events: all; }
.popup-card {
  background: var(--color-surface);
  border: 1px solid oklch(from var(--color-text) l c h / 0.1);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  padding: var(--space-8);
  max-width: 360px; width: 100%;
  transform: scale(0.94) translateY(12px);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  text-align: center;
}
.popup-overlay.active .popup-card { transform: scale(1) translateY(0); }
.popup-icon {
  width: 64px; height: 64px; border-radius: var(--radius-full);
  background: var(--color-warning-highlight);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto var(--space-4);
  font-size: 2rem;
}
.popup-title { font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-2); }
.popup-habit-name {
  font-size: var(--text-base); color: var(--color-text-muted); margin-bottom: var(--space-6);
  padding: var(--space-2) var(--space-4); background: var(--color-surface-offset);
  border-radius: var(--radius-lg); display: inline-block;
}
.popup-actions { display: flex; flex-direction: column; gap: var(--space-3); }
.btn-done {
  display: flex; align-items: center; justify-content: center; gap: var(--space-2);
  padding: var(--space-4); border-radius: var(--radius-lg);
  font-size: var(--text-base); font-weight: 600;
  background: var(--color-success); color: #fff; min-height: 52px;
}
.btn-done:hover { background: var(--color-success-hover); }
.btn-done:active { transform: scale(0.97); }
.btn-snooze {
  display: flex; align-items: center; justify-content: center; gap: var(--space-2);
  padding: var(--space-3); border-radius: var(--radius-lg);
  font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted);
  background: var(--color-surface-offset); min-height: 44px;
}
.btn-snooze:hover { background: var(--color-divider); color: var(--color-text); }
.btn-skip {
  font-size: var(--text-xs); color: var(--color-text-faint);
  padding: var(--space-2); min-height: 36px;
}
.btn-skip:hover { color: var(--color-text-muted); }

/* ===== ADD HABIT MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: oklch(from var(--color-bg) l c h / 0.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
  padding-bottom: env(safe-area-inset-bottom);
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--color-surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  box-shadow: var(--shadow-lg);
  padding: var(--space-6);
  width: 100%; max-width: 480px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal-overlay.active .modal-sheet { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: var(--color-divider); border-radius: var(--radius-full); margin: 0 auto var(--space-5); }
.modal-title { font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-6); }
.form-group { margin-bottom: var(--space-5); }
.form-label { font-size: var(--text-sm); font-weight: 600; color: var(--color-text-muted); display: block; margin-bottom: var(--space-2); }
.form-input {
  width: 100%; padding: var(--space-3) var(--space-4);
  border: 1px solid var(--color-border); border-radius: var(--radius-lg);
  background: var(--color-surface-2); color: var(--color-text);
  font-size: var(--text-base); min-height: 48px;
  transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive);
}
.form-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15); }
.emoji-grid { display: flex; flex-wrap: wrap; gap: var(--space-2); }
.emoji-btn {
  width: 44px; height: 44px; border-radius: var(--radius-md); font-size: 1.25rem;
  display: flex; align-items: center; justify-content: center;
  background: var(--color-surface-offset); border: 2px solid transparent;
  transition: all 0.15s;
}
.emoji-btn:hover { background: var(--color-primary-highlight); }
.emoji-btn.selected { border-color: var(--color-primary); background: var(--color-primary-highlight); }
.reminder-grid { display: flex; flex-wrap: wrap; gap: var(--space-2); }
.reminder-chip {
  padding: var(--space-2) var(--space-3); border-radius: var(--radius-full);
  font-size: var(--text-sm); font-weight: 500;
  background: var(--color-surface-offset); border: 2px solid transparent;
  min-height: 40px; display: flex; align-items: center;
  transition: all 0.15s;
}
.reminder-chip:hover { background: var(--color-primary-highlight); }
.reminder-chip.selected { border-color: var(--color-primary); background: var(--color-primary-highlight); color: var(--color-primary); }
.custom-time-row { display: flex; gap: var(--space-2); align-items: center; margin-top: var(--space-2); }
.btn-submit {
  width: 100%; padding: var(--space-4); border-radius: var(--radius-lg);
  background: var(--color-primary); color: #fff;
  font-size: var(--text-base); font-weight: 700;
  min-height: 52px; margin-top: var(--space-6);
}
.btn-submit:hover { background: var(--color-primary-hover); }
.btn-submit:active { transform: scale(0.98); }
.btn-cancel { width: 100%; padding: var(--space-3); border-radius: var(--radius-lg); font-size: var(--text-sm); color: var(--color-text-muted); min-height: 44px; margin-top: var(--space-2); }
.btn-cancel:hover { color: var(--color-text); background: var(--color-surface-offset); }

/* ===== EMPTY STATE ===== */
.empty-state { text-align: center; padding: var(--space-16) var(--space-8); color: var(--color-text-muted); }
.empty-icon { font-size: 3rem; margin-bottom: var(--space-4); }
.empty-state h3 { font-size: var(--text-lg); color: var(--color-text); margin-bottom: var(--space-2); }
.empty-state p { font-size: var(--text-sm); max-width: 28ch; margin: 0 auto; }

/* ===== CONFETTI ===== */
.confetti-piece {
  position: fixed; width: 10px; height: 10px; border-radius: 2px;
  pointer-events: none; z-index: 300;
  animation: confettiFall 1s ease-out forwards;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(120px) rotate(720deg) scale(0.5); }
}

/* ===== DARK MODE TOGGLE ===== */
</style>
</head>
<body>

<header class="app-header">
  <a class="app-logo" href="#" aria-label="習慣トラッカー">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
      <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="2.5"/>
      <path d="M8.5 14.5L12 18L19.5 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    習慣トラッカー
  </a>
  <div class="header-actions">
    <button class="icon-btn" data-theme-toggle aria-label="ダークモード切替">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<main class="main">
  <div class="date-header">
    <div class="date-label">今日</div>
    <div class="date-today" id="today-label"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 0 完了</div>
  </div>

  <div class="section-heading">
    今日の習慣
    <button class="add-btn" id="open-add-btn" aria-label="習慣を追加">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      追加
    </button>
  </div>

  <div class="habit-list" id="habit-list"></div>
</main>

<!-- POPUP NOTIFICATION -->
<div class="popup-overlay" id="popup-overlay" role="dialog" aria-modal="true" aria-labelledby="popup-title">
  <div class="popup-card">
    <div class="popup-icon" id="popup-icon">⏰</div>
    <div class="popup-title" id="popup-title">チェックイン時間です！</div>
    <div class="popup-habit-name" id="popup-habit-name"></div>
    <div class="popup-actions">
      <button class="btn-done" id="popup-done-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        完了しました！
      </button>
      <button class="btn-snooze" id="popup-snooze-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        10分後にもう一度
      </button>
      <button class="btn-skip" id="popup-skip-btn">今日はスキップ</button>
    </div>
  </div>
</div>

<!-- ADD HABIT MODAL -->
<div class="modal-overlay" id="add-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title" id="modal-title">習慣を追加</h2>
    <div class="form-group">
      <label class="form-label" for="habit-name-input">習慣の名前</label>
      <input class="form-input" type="text" id="habit-name-input" placeholder="例: 30分ウォーキング" maxlength="40">
    </div>
    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div class="emoji-grid" id="emoji-grid">
        <button class="emoji-btn selected" data-emoji="🏃">🏃</button>
        <button class="emoji-btn" data-emoji="📚">📚</button>
        <button class="emoji-btn" data-emoji="🧘">🧘</button>
        <button class="emoji-btn" data-emoji="💊">💊</button>
        <button class="emoji-btn" data-emoji="💧">💧</button>
        <button class="emoji-btn" data-emoji="🥗">🥗</button>
        <button class="emoji-btn" data-emoji="😴">😴</button>
        <button class="emoji-btn" data-emoji="✍️">✍️</button>
        <button class="emoji-btn" data-emoji="🎯">🎯</button>
        <button class="emoji-btn" data-emoji="🎸">🎸</button>
        <button class="emoji-btn" data-emoji="🌱">🌱</button>
        <button class="emoji-btn" data-emoji="⭐">⭐</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">リマインダー時刻</label>
      <div class="reminder-grid" id="reminder-grid">
        <button class="reminder-chip" data-time="07:00">朝 7:00</button>
        <button class="reminder-chip" data-time="08:00">朝 8:00</button>
        <button class="reminder-chip" data-time="12:00">昼 12:00</button>
        <button class="reminder-chip selected" data-time="18:00">夜 18:00</button>
        <button class="reminder-chip" data-time="21:00">夜 21:00</button>
        <button class="reminder-chip" data-time="22:00">夜 22:00</button>
      </div>
      <div class="custom-time-row">
        <label class="form-label" for="custom-time" style="white-space:nowrap;margin:0">カスタム:</label>
        <input class="form-input" type="time" id="custom-time" style="flex:1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">繰り返し間隔</label>
      <div class="reminder-grid" id="interval-grid">
        <button class="interval-chip reminder-chip selected" data-interval="0">なし（1日1回）</button>
        <button class="interval-chip reminder-chip" data-interval="30">30分ごと</button>
        <button class="interval-chip reminder-chip" data-interval="60">1時間ごと</button>
        <button class="interval-chip reminder-chip" data-interval="120">2時間ごと</button>
      </div>
    </div>
    <button class="btn-submit" id="save-habit-btn">追加する</button>
    <button class="btn-cancel" id="close-modal-btn">キャンセル</button>
  </div>
</div>

<script>
// ===== STATE =====
let habits = [
  { id: 1, name: '朝のストレッチ', emoji: '🧘', time: '07:30', interval: 0, streak: 5, completed: false, snoozed: false },
  { id: 2, name: '水を2リットル飲む', emoji: '💧', time: '09:00', interval: 60, streak: 12, completed: false, snoozed: false },
  { id: 3, name: '読書 30分', emoji: '📚', time: '21:00', interval: 0, streak: 3, completed: false, snoozed: false },
];
let nextId = 4;
let selectedEmoji = '🏃';
let selectedTime = '18:00';
let selectedInterval = 0;
let popupQueue = [];
let currentPopupHabit = null;
let checkIntervalId = null;
let snoozeTimers = {};

// ===== UTILS =====
function pad2(n) { return String(n).padStart(2, '0'); }
function timeToMinutes(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function nowMinutes() { const d = new Date(); return d.getHours()*60+d.getMinutes(); }
function formatDate(d) {
  const days = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  return `${d.getFullYear()}年 ${months[d.getMonth()]}${d.getDate()}日（${days[d.getDay()]}）`;
}

// ===== RENDER =====
function renderHabits() {
  const list = document.getElementById('habit-list');
  const now = nowMinutes();

  if (habits.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <h3>習慣がまだありません</h3>
        <p>「追加」ボタンから最初の習慣を登録しましょう</p>
      </div>`;
    updateProgress();
    return;
  }

  list.innerHTML = habits.map(h => {
    const tMin = timeToMinutes(h.time);
    const isOverdue = !h.completed && tMin < now && (now - tMin) < 120;
    const isDone = h.completed;
    const cardClass = isDone ? 'completed' : isOverdue ? 'overdue' : '';
    const statusBadge = isDone
      ? `<span class="status-badge done">✓ 完了</span>`
      : isOverdue
        ? `<span class="status-badge due">⚠ 確認してください</span>`
        : `<span class="status-badge upcoming">${h.time}</span>`;
    const streakBadge = h.streak > 0 ? `<span class="habit-streak">🔥${h.streak}日</span>` : '';
    return `
      <div class="habit-card ${cardClass}" id="card-${h.id}">
        <button class="check-btn ${isDone ? 'done' : ''}" onclick="toggleHabit(${h.id})" aria-label="${h.name}を${isDone?'未完了':'完了'}にする">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <div class="habit-info">
          <div class="habit-name">${h.emoji} ${h.name}</div>
          <div class="habit-meta">
            <span class="habit-time">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${h.time}${h.interval > 0 ? ' · '+h.interval+'分ごと' : ''}
            </span>
            ${streakBadge}
          </div>
          <div class="habit-meta" style="margin-top:var(--space-1)">${statusBadge}</div>
        </div>
        <div class="habit-actions">
          <button class="delete-btn" onclick="deleteHabit(${h.id})" aria-label="${h.name}を削除">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>`;
  }).join('');
  updateProgress();
}

function updateProgress() {
  const done = habits.filter(h => h.completed).length;
  const total = habits.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total} 完了 (${pct}%)`;
}

// ===== INTERACTIONS =====
function toggleHabit(id) {
  const h = habits.find(x => x.id === id);
  if (!h) return;
  h.completed = !h.completed;
  if (h.completed) {
    h.streak++;
    spawnConfetti();
  } else {
    h.streak = Math.max(0, h.streak - 1);
  }
  renderHabits();
}

function deleteHabit(id) {
  habits = habits.filter(x => x.id !== id);
  renderHabits();
}

// ===== CONFETTI =====
function spawnConfetti() {
  const colors = ['#01696f','#437a22','#d19900','#a12c7b','#006494'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${20 + Math.random()*60}vw;
      top: ${30 + Math.random()*30}vh;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay: ${Math.random()*0.3}s;
      animation-duration: ${0.7 + Math.random()*0.5}s;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

// ===== POPUP NOTIFICATION =====
function showPopup(habit) {
  currentPopupHabit = habit;
  document.getElementById('popup-icon').textContent = habit.emoji;
  document.getElementById('popup-habit-name').textContent = habit.name;
  document.getElementById('popup-overlay').classList.add('active');
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('active');
  currentPopupHabit = null;
  setTimeout(processQueue, 500);
}

function processQueue() {
  if (popupQueue.length > 0 && !currentPopupHabit) {
    showPopup(popupQueue.shift());
  }
}

document.getElementById('popup-done-btn').addEventListener('click', () => {
  if (currentPopupHabit) {
    const h = habits.find(x => x.id === currentPopupHabit.id);
    if (h && !h.completed) {
      h.completed = true;
      h.streak++;
      renderHabits();
      spawnConfetti();
    }
  }
  closePopup();
});

document.getElementById('popup-snooze-btn').addEventListener('click', () => {
  if (currentPopupHabit) {
    const h = currentPopupHabit;
    const snoozeId = setTimeout(() => {
      if (!habits.find(x => x.id === h.id)?.completed) {
        popupQueue.push(h);
        processQueue();
      }
    }, 10 * 60 * 1000); // 10 min
    snoozeTimers[h.id] = snoozeId;
  }
  closePopup();
});

document.getElementById('popup-skip-btn').addEventListener('click', closePopup);

// ===== REMINDER CHECK (every 30 seconds) =====
function checkReminders() {
  const now = nowMinutes();
  const nowSec = new Date().getSeconds();
  habits.forEach(h => {
    if (h.completed) return;
    if (currentPopupHabit && currentPopupHabit.id === h.id) return;
    const tMin = timeToMinutes(h.time);
    // Check exact minute match (fires within the 30s window)
    const diff = now - tMin;
    if (diff === 0 && nowSec < 35) {
      if (!popupQueue.find(q => q.id === h.id)) {
        popupQueue.push(h);
        processQueue();
      }
    }
    // Interval check
    if (h.interval > 0 && tMin <= now && diff > 0 && diff % h.interval < 1) {
      if (!popupQueue.find(q => q.id === h.id)) {
        popupQueue.push(h);
        processQueue();
      }
    }
  });
}
checkIntervalId = setInterval(checkReminders, 30000);

// ===== ADD HABIT MODAL =====
document.getElementById('open-add-btn').addEventListener('click', () => {
  document.getElementById('add-modal').classList.add('active');
  document.getElementById('habit-name-input').focus();
});
document.getElementById('close-modal-btn').addEventListener('click', () => {
  document.getElementById('add-modal').classList.remove('active');
});
document.getElementById('add-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('add-modal')) {
    document.getElementById('add-modal').classList.remove('active');
  }
});

// Emoji selection
document.getElementById('emoji-grid').addEventListener('click', (e) => {
  const btn = e.target.closest('.emoji-btn');
  if (!btn) return;
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedEmoji = btn.dataset.emoji;
});

// Time selection
document.getElementById('reminder-grid').addEventListener('click', (e) => {
  const chip = e.target.closest('[data-time]');
  if (!chip) return;
  document.querySelectorAll('[data-time]').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
  selectedTime = chip.dataset.time;
  document.getElementById('custom-time').value = '';
});
document.getElementById('custom-time').addEventListener('change', (e) => {
  if (e.target.value) {
    document.querySelectorAll('[data-time]').forEach(c => c.classList.remove('selected'));
    selectedTime = e.target.value;
  }
});

// Interval selection
document.getElementById('interval-grid').addEventListener('click', (e) => {
  const chip = e.target.closest('.interval-chip');
  if (!chip) return;
  document.querySelectorAll('.interval-chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
  selectedInterval = parseInt(chip.dataset.interval, 10);
});

document.getElementById('save-habit-btn').addEventListener('click', () => {
  const name = document.getElementById('habit-name-input').value.trim();
  if (!name) {
    document.getElementById('habit-name-input').focus();
    return;
  }
  habits.push({ id: nextId++, name, emoji: selectedEmoji, time: selectedTime, interval: selectedInterval, streak: 0, completed: false, snoozed: false });
  document.getElementById('habit-name-input').value = '';
  document.getElementById('add-modal').classList.remove('active');
  renderHabits();
});

// ===== DARK MODE TOGGLE =====
(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  t && t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    t.innerHTML = d === 'dark'
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();

// ===== INIT =====
document.getElementById('today-label').textContent = formatDate(new Date());

// Simulate a reminder after 5 seconds (demo purposes)
setTimeout(() => {
  if (habits.length > 0 && !habits[0].completed) {
    popupQueue.push(habits[0]);
    processQueue();
  }
}, 5000);

renderHabits();
</script>
</body>
</html>
